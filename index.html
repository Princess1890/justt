<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World💗</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Meme Section -->
    <div class="meme-container">
        <img src="dog_meme-removebg-preview.png" alt="Funny Meme" class="meme">
        <!-- Replace meme.jpg with your meme image -->
    </div>

    <!-- Main Card -->
    <div class="card">

        <h1 id="title">Is something special today? 👀</h1>

        <p id="message">
            do you remember ?
        </p>

        <div id="buttons" class="buttons">
            <button onclick="yesPath()">YES</button>
            <button onclick="firstNo()">NO</button>
        </div>

        <a href="countdown.html" id="continueBtn" class="continue-btn">
            Let's see what's so special 👀
        </a>

    </div>

<script>

function yesPath() {
    document.getElementById("title").innerHTML = "😌";
    document.getElementById("message").innerHTML =
    "Cool... You guessed it right.";

    document.getElementById("buttons").style.display = "none";
    document.getElementById("continueBtn").style.display = "inline-block";
}

function firstNo() {

    document.getElementById("title").innerHTML = "🤨";
    document.getElementById("message").innerHTML =
    "Are you sure?";

    document.getElementById("buttons").innerHTML = `
        <button onclick="sureYes()">YES</button>
        <button onclick="sureNo()">NO</button>
    `;
}

function sureYes() {

    document.getElementById("title").innerHTML = "🤭";
    document.getElementById("message").innerHTML =
    "Expected from you.";

    document.getElementById("buttons").style.display = "none";
    document.getElementById("continueBtn").style.display = "inline-block";
}

function sureNo() {

    document.getElementById("title").innerHTML = "😌";
    document.getElementById("message").innerHTML =
    "See? You guessed it right.";

    document.getElementById("buttons").style.display = "none";
    document.getElementById("continueBtn").style.display = "inline-block";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift 3 ⭐</title>
    <link rel="stylesheet" href="wish.css">
</head>
<body>

<div class="container">

    <h1>⭐</h1>
    <p>Click and collect your little birthday wishes ✨</p>

    <div id="wishArea"></div>

    <button onclick="showWish()" id="wishBtn">Reveal a Wish ⭐</button>

    <a href="gift.html" class="back-btn hidden" id="backBtn">
        Back to Gifts 🎁
    </a>

</div>

<script>

const wishes = [
    "Happiness ✨",
    "Peace 🕊",
    "Good Music 🎵",
    "Good Luck 🍀",
    "Less Stress 🌙",
    "More Smiles 😌",
    "Big Dreams ⭐",
    "Good Health 💗",
    "More Adventures 🏍",
    "Success 🎯",
    "Beautiful Moments 🌸",
    "Stay You 🤍"
];
const positions = [
    {top:"8%", left:"15%"},
    {top:"10%", left:"45%"},
    {top:"8%", left:"72%"},

    {top:"28%", left:"10%"},
    {top:"30%", left:"40%"},
    {top:"28%", left:"70%"},

    {top:"50%", left:"18%"},
    {top:"48%", left:"48%"},
    {top:"52%", left:"75%"},

    {top:"72%", left:"12%"},
    {top:"70%", left:"42%"},
    {top:"74%", left:"70%"}
];

let count = 0;

function showWish(){
    if(count < wishes.length){

        const star = document.createElement("div");
        star.classList.add("wish-star");
        star.innerHTML = `
            <div class="star-shape">
                ${wishes[count]}
            </div>
        `;

        star.style.top = positions[count].top;
        star.style.left = positions[count].left;

        document.getElementById("wishArea").appendChild(star);

        count++;

    } else {
        document.getElementById("wishBtn").style.display = "none";
        document.getElementById("backBtn").classList.remove("hidden");
    }
}

</script>

</body>
</html>
